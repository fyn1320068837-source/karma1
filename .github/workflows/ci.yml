name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check karma/ tests/

      - name: Dead code scan (vulture, min-confidence 60)
        run: vulture karma/ whitelist.py --min-confidence 60

      - name: Type check (mypy)
        run: |
          mypy karma/
          mypy tests/

      - name: Test
        run: pytest tests/ -q

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Verify wheel contains yaml templates
        run: |
          python -c "
          import glob, zipfile, sys
          wheels = glob.glob('dist/karma-*-py3-none-any.whl')
          if not wheels: sys.exit('wheel build 失败 — dist/ 无 wheel')
          z = zipfile.ZipFile(wheels[0])
          names = z.namelist()
          # v0.6.0 BREAKING: sticky.* → rules.* 重命名 (此前 expected 还查
          # data/sticky.dev.example.yaml, 但 wheel 实际产物已是 rules.* —
          # 校验从 v0.6.0 起就 fail, 但前面的 fail-step 一直挡着没暴露,
          # 直到 v0.9.6 把前面修干净才浮上来)。
          expected = [
              'data/rules.dev.example.yaml',
              'data/rules.dev.example.zh.yaml',
              'data/locales/en.yaml',
              'data/locales/zh.yaml',
              'data/config.example.yaml',
              'skills/karma/SKILL.md',
          ]
          missing = [n for n in expected if n not in names]
          if missing: sys.exit(f'wheel 缺文件: {missing}')
          print(f'{wheels[0]} 含全部 {len(expected)} 个关键模板 ✓')
          "
