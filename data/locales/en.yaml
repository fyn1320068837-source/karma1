# karma i18n — English translations
#
# Keys are stable identifiers; values are user-visible English strings.
# Supports {placeholder} interpolation via str.format() in karma.i18n.tr().

# ===== rule baseline header (format_for_injection) =====
inject.header.title: "[karma — Your long-term agreement with the user]"
inject.header.line1: "You're collaborating with a real human user who listed several long-term priorities."
inject.header.line2: "This isn't rules and isn't a judgment — these are the collaborative agreements they hope to build with you."
inject.drift_marker: "  〔Last response had drift on this one — let's realign this turn〕"

# ===== PostToolUse mid-injection (锚定刷新) =====
mid_inject.header.title: "[karma — After long context, recall the agreement with the user]"
mid_inject.header.line1: "Context has accumulated for a while. Reminding you of the long-term priorities"
mid_inject.header.line2: "(no need to respond, just refresh in mind to avoid future drift):"

# ===== UserPromptSubmit strong reminder (上一回应违反) =====
strong_reminder.header.title: "\n\n[karma — Last response had some misalignment with user agreement]"
strong_reminder.header.line: "Your last response had drift on some points; see if you can adjust this turn:"
strong_reminder.footer: "\nJust respond naturally this turn; no need to over-compensate for this one."

# ===== Stop hook reason (keep-pushing intervention) =====
stop.reason: "[karma — Last response didn't show a next-step push signal] The user is fully-delegating — they expect immediate continuation after finishing a wave. If you need their judgment, ask clearly; if truly saturated, say where you're stuck — don't silently wait. (Reminder {count}/{max})"

# ===== Stop hook force_block reason =====
stop.force_block.reason: "karma forced intervention: cumulative violations of {rules} totaling {count} times. Must fix root cause (deep-dive pattern / engine bug / protocol) or explicitly hand off to user. No more bypassing (manually modifying karma state / temporarily disabling rules)."

# ===== SessionStart baseline =====
session_start.compact.title: "[karma — After context compact, recall the agreement with the user]"
session_start.compact.prior_drift_header: "Rules that drifted before compact (give them extra attention on restart):"
session_start.compact.tail: "After compact, agreements easily fade in new context — stay aware of behaving in these directions."
session_start.resume.title: "[karma — Session resumed, recalling agreement with the user]"
session_start.startup.title: "[karma — Session start, your long-term agreement with the user (source={source})]"

# ===== SubagentStart =====
subagent_start.title: "[karma — You're a sub-Agent sent by the parent session, inheriting the user's long-term agreements]"
subagent_start.tail: "Behave per these directions when running tasks. The main Agent will receive a summary reminder when you finish."

# ===== Violation stderr =====
violation.stderr.line: "⚠️ karma: Agent violated {rule_id!r} — {trigger}"
violation.stderr.suggestion: "   Suggestion: {fix}"
violation.keyword.stderr.line: "⚠️ karma: Agent triggered keyword for {rule_id!r} (word {trigger!r})"

# ===== Notifications =====
notify.violation.title: "karma detected violation"
notify.escalated.title: "🚨 karma severe — {count} cumulative violations"
